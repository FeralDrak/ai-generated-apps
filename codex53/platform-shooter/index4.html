<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Platform Shooter</title>
    <style>
        :root {
            --bg1: #0f1028;
            --bg2: #1d2157;
            --accent: #5df7ff;
            --accent2: #ff4fd8;
            --good: #73ff9d;
            --warn: #ffd166;
            --danger: #ff5d5d;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: white;
            background:
                    radial-gradient(1200px 600px at 15% 10%, #2b2f7f44 0%, transparent 65%),
                    radial-gradient(1000px 500px at 90% 85%, #6a1d7544 0%, transparent 60%),
                    linear-gradient(145deg, var(--bg1), #0a0b1b 45%, var(--bg2));
            overflow: hidden;
        }

        .frame {
            width: min(100vw, 1100px);
            height: min(100vh, 700px);
            padding: 14px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px #000;
            user-select: none;
            gap: 16px;
            flex-wrap: wrap;
        }

        .hud b { color: var(--accent); }

        .pill {
            border: 1px solid #ffffff30;
            border-radius: 10px;
            padding: 6px 10px;
            background: #07091088;
        }

        canvas {
            width: 100%;
            height: calc(100% - 48px);
            border-radius: 12px;
            border: 1px solid #ffffff2d;
            box-shadow:
                    0 0 0 1px #7de3ff11 inset,
                    0 30px 80px #000a,
                    0 0 80px #3f4dee44;
            background: linear-gradient(#20265e 0%, #11173b 58%, #0d1027 100%);
            image-rendering: crisp-edges;
        }

        .overlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            pointer-events: none;
        }

        .panel {
            pointer-events: all;
            text-align: center;
            background: #0d1030d6;
            border: 1px solid #ffffff2b;
            border-radius: 14px;
            padding: 18px 22px;
            box-shadow: 0 16px 80px #000a;
            max-width: 560px;
        }

        .panel h1 {
            margin: 0 0 10px;
            color: var(--accent);
            text-shadow: 0 0 15px #5df7ff66;
        }

        .panel p { margin: 8px 0; opacity: 0.95; }

        button {
            margin-top: 8px;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 1rem;
            font-weight: 700;
            color: #081220;
            background: linear-gradient(90deg, var(--accent), #7af9d0);
            cursor: pointer;
        }

        button:hover { filter: brightness(1.1); }
    </style>
</head>
<body>
<div class="frame">
    <div class="hud">
        <div class="pill">Score: <b id="score">0</b></div>
        <div class="pill">Vie: <b id="lives">5</b></div>
        <div class="pill">Niveau: <b id="level">1</b></div>
        <div class="pill">Combo: <b id="combo">x1</b></div>
        <div class="pill">Arme: <b id="weapon">Normal</b></div>
    </div>
    <canvas id="game" width="1080" height="620"></canvas>
</div>

<div class="overlay" id="overlay">
    <div class="panel">
        <h1>Neon Platform Shooter</h1>
        <p><strong>ZQSD / Flèches</strong> pour bouger, <strong>ESPACE</strong> pour sauter, <strong>J</strong> pour tirer.</p>
        <p>Élimine des monstres, récupère des bonus (vie, rapid fire, blast), grimpe les niveaux et garde ton combo vivant.</p>
        <button id="startBtn">Lancer la partie</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const ui = {
        score: document.getElementById("score"),
        lives: document.getElementById("lives"),
        level: document.getElementById("level"),
        combo: document.getElementById("combo"),
        weapon: document.getElementById("weapon"),
        overlay: document.getElementById("overlay"),
        startBtn: document.getElementById("startBtn")
    };

    const W = canvas.width;
    const H = canvas.height;
    const GROUND_Y = H - 30;

    const keys = {};
    window.addEventListener("keydown", e => { keys[e.key.toLowerCase()] = true; if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(e.key.toLowerCase())) e.preventDefault(); });
    window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

    const rand = (a, b) => Math.random() * (b - a) + a;

    let running = false;
    let lastTime = 0;
    let spawnTimer = 0;
    let bonusTimer = 0;
    let hitFlash = 0;

    const state = {
        score: 0,
        lives: 5,
        level: 1,
        combo: 1,
        comboTimer: 0,
        enemiesKilled: 0,
        bullets: [],
        enemies: [],
        bonuses: [],
        particles: []
    };

    const player = {
        x: 120,
        y: 100,
        w: 34,
        h: 46,
        vx: 0,
        vy: 0,
        speed: 370,
        jump: 580,
        onGround: false,
        shootCd: 0,
        fireRate: 0.22,
        direction: 1,
        weaponMode: "normal",
        powerTimer: 0,
        invuln: 0
    };

    const platforms = [
        { x: 0, y: GROUND_Y, w: W, h: 30 },
        { x: 150, y: 500, w: 220, h: 18 },
        { x: 440, y: 430, w: 240, h: 18 },
        { x: 760, y: 360, w: 220, h: 18 },
        { x: 620, y: 250, w: 160, h: 18 },
        { x: 260, y: 280, w: 170, h: 18 }
    ];

    function resetGame() {
        Object.assign(state, { score: 0, lives: 5, level: 1, combo: 1, comboTimer: 0, enemiesKilled: 0, bullets: [], enemies: [], bonuses: [], particles: [] });
        Object.assign(player, { x: 120, y: 120, vx: 0, vy: 0, onGround: false, shootCd: 0, fireRate: 0.22, direction: 1, weaponMode: "normal", powerTimer: 0, invuln: 0 });
        spawnTimer = 0;
        bonusTimer = 0;
        hitFlash = 0;
        running = true;
        ui.overlay.style.display = "none";
        lastTime = performance.now();
        requestAnimationFrame(loop);
    }

    function spawnEnemy() {
        const side = Math.random() < 0.5 ? -30 : W + 30;
        const speed = rand(70, 130) + state.level * 8;
        const hp = 1 + Math.floor((state.level - 1) / 2);
        state.enemies.push({
            x: side,
            y: rand(120, 260),
            w: 34,
            h: 34,
            vx: side < 0 ? speed : -speed,
            vy: 0,
            hp,
            type: Math.random() < 0.25 ? "jumper" : "runner",
            color: Math.random() < 0.5 ? "#ff4fd8" : "#ff7a59"
        });
    }

    function spawnBonus() {
        const kinds = ["life", "rapid", "blast"];
        const kind = kinds[Math.floor(Math.random() * kinds.length)];
        state.bonuses.push({ x: rand(80, W - 80), y: rand(80, 260), w: 24, h: 24, kind, vy: rand(15, 35), t: 8 });
    }

    function shoot() {
        if (player.shootCd > 0) return;
        player.shootCd = player.fireRate;
        const base = {
            x: player.x + player.w / 2,
            y: player.y + player.h / 2,
            r: 5,
            vx: player.direction * 680,
            vy: 0,
            damage: player.weaponMode === "blast" ? 2 : 1,
            life: 1.2,
            color: player.weaponMode === "blast" ? "#ffd166" : "#5df7ff"
        };
        state.bullets.push(base);
        if (player.weaponMode === "blast") {
            state.bullets.push({ ...base, vy: -120, life: 0.85, r: 4, vx: base.vx * 0.92 });
            state.bullets.push({ ...base, vy: 120, life: 0.85, r: 4, vx: base.vx * 0.92 });
        }
    }

    function applyBonus(kind) {
        if (kind === "life") {
            state.lives = Math.min(9, state.lives + 1);
        } else if (kind === "rapid") {
            player.weaponMode = "rapid";
            player.fireRate = 0.1;
            player.powerTimer = 9;
        } else {
            player.weaponMode = "blast";
            player.fireRate = 0.18;
            player.powerTimer = 9;
        }
    }

    function update(dt) {
        if (!running) return;

        const left = keys["a"] || keys["q"] || keys["arrowleft"];
        const right = keys["d"] || keys["arrowright"];
        const jumpPressed = keys["w"] || keys["z"] || keys["arrowup"] || keys[" "];
        const shootPressed = keys["j"];

        player.vx = (right - left) * player.speed;
        if (player.vx !== 0) player.direction = Math.sign(player.vx);
        if (jumpPressed && player.onGround) {
            player.vy = -player.jump;
            player.onGround = false;
        }
        if (shootPressed) shoot();

        player.vy += 1400 * dt;
        player.x += player.vx * dt;
        player.y += player.vy * dt;

        if (player.x < 0) player.x = 0;
        if (player.x + player.w > W) player.x = W - player.w;

        player.onGround = false;
        for (const p of platforms) {
            if (player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + 18 && player.vy >= 0) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.onGround = true;
            }
        }
        if (player.y > H + 120) {
            damagePlayer();
            player.x = 120;
            player.y = 120;
            player.vy = 0;
        }

        player.shootCd = Math.max(0, player.shootCd - dt);
        player.invuln = Math.max(0, player.invuln - dt);
        if (player.powerTimer > 0) {
            player.powerTimer -= dt;
            if (player.powerTimer <= 0) {
                player.weaponMode = "normal";
                player.fireRate = 0.22;
            }
        }

        spawnTimer -= dt;
        if (spawnTimer <= 0) {
            spawnEnemy();
            spawnTimer = Math.max(0.3, 1.1 - state.level * 0.06);
        }
        bonusTimer -= dt;
        if (bonusTimer <= 0) {
            if (Math.random() < 0.75) spawnBonus();
            bonusTimer = rand(8, 13);
        }

        for (const b of state.bullets) {
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            b.life -= dt;
        }
        state.bullets = state.bullets.filter(b => b.life > 0 && b.x > -20 && b.x < W + 20 && b.y > -20 && b.y < H + 20);

        for (const e of state.enemies) {
            if (e.type === "jumper" && Math.random() < 0.008 + state.level * 0.0006) e.vy = -rand(260, 360);
            e.vy += 1300 * dt;
            e.x += e.vx * dt;
            e.y += e.vy * dt;

            let grounded = false;
            for (const p of platforms) {
                if (e.x + e.w > p.x && e.x < p.x + p.w && e.y + e.h >= p.y && e.y + e.h <= p.y + p.h + 16 && e.vy >= 0) {
                    e.y = p.y - e.h;
                    e.vy = 0;
                    grounded = true;
                }
            }
            if (!grounded && e.y + e.h >= GROUND_Y) {
                e.y = GROUND_Y - e.h;
                e.vy = 0;
            }

            if (e.x < -40 || e.x > W + 40) e.vx *= -1;
            if (player.x < e.x) e.vx -= 18 * dt; else e.vx += 18 * dt;
            e.vx = Math.max(-260, Math.min(260, e.vx));
        }

        for (const p of state.bonuses) {
            p.y += p.vy * dt;
            p.t -= dt;
        }
        state.bonuses = state.bonuses.filter(p => p.t > 0 && p.y < H + 40);

        // Bullet/enemy collisions
        for (const b of state.bullets) {
            for (const e of state.enemies) {
                if (circleRectCollision(b, e)) {
                    b.life = 0;
                    e.hp -= b.damage;
                    spark(b.x, b.y, b.color, 8);
                    if (e.hp <= 0) {
                        state.score += 100 * state.combo;
                        state.enemiesKilled += 1;
                        state.combo = Math.min(12, state.combo + 1);
                        state.comboTimer = 3.5;
                        spark(e.x + e.w / 2, e.y + e.h / 2, e.color, 14);
                        e.dead = true;
                    }
                }
            }
        }
        state.enemies = state.enemies.filter(e => !e.dead);

        if (state.comboTimer > 0) {
            state.comboTimer -= dt;
            if (state.comboTimer <= 0) state.combo = 1;
        }

        // Player collisions
        for (const e of state.enemies) {
            if (rectsOverlap(player, e) && player.invuln <= 0) {
                damagePlayer();
                player.invuln = 1.2;
                player.vy = -260;
                player.vx = (player.x < e.x ? -1 : 1) * 240;
            }
        }

        for (const p of state.bonuses) {
            if (rectsOverlap(player, p)) {
                applyBonus(p.kind);
                p.t = 0;
                state.score += 150;
                spark(p.x + p.w / 2, p.y + p.h / 2, "#73ff9d", 12);
            }
        }

        state.particles.forEach(s => {
            s.x += s.vx * dt;
            s.y += s.vy * dt;
            s.vy += 220 * dt;
            s.life -= dt;
        });
        state.particles = state.particles.filter(s => s.life > 0);

        const targetLevel = 1 + Math.floor(state.enemiesKilled / 10);
        if (targetLevel !== state.level) {
            state.level = targetLevel;
            state.score += 250;
        }

        hitFlash = Math.max(0, hitFlash - dt * 2.7);
        syncHud();

        if (state.lives <= 0) gameOver();
    }

    function damagePlayer() {
        state.lives -= 1;
        state.combo = 1;
        state.comboTimer = 0;
        hitFlash = 1;
        spark(player.x + player.w / 2, player.y + player.h / 2, "#ff5d5d", 18);
    }

    function spark(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            state.particles.push({
                x,
                y,
                vx: rand(-220, 220),
                vy: rand(-240, 40),
                life: rand(0.2, 0.6),
                r: rand(1.5, 3.4),
                color
            });
        }
    }

    function gameOver() {
        running = false;
        ui.overlay.style.display = "grid";
        ui.overlay.querySelector("h1").textContent = "Game Over";
        ui.overlay.querySelector("p").innerHTML = `Score final: <strong>${state.score}</strong> • Niveau atteint: <strong>${state.level}</strong>`;
        ui.overlay.querySelectorAll("p")[1].textContent = "Appuie sur le bouton pour relancer une run encore plus explosive.";
        ui.startBtn.textContent = "Rejouer";
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Background stars
        for (let i = 0; i < 60; i++) {
            const x = (i * 177 + performance.now() * 0.03) % W;
            const y = (i * 97) % (H - 80);
            ctx.fillStyle = i % 3 === 0 ? "#ffffff22" : "#9bbdff22";
            ctx.fillRect(x, y, 2, 2);
        }

        // Platforms
        for (const p of platforms) {
            const grad = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
            grad.addColorStop(0, "#69d2ff");
            grad.addColorStop(1, "#2153af");
            ctx.fillStyle = grad;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#ffffff20";
            ctx.fillRect(p.x, p.y, p.w, 3);
        }

        // Player
        if (!(player.invuln > 0 && Math.floor(player.invuln * 12) % 2 === 0)) {
            ctx.fillStyle = "#5df7ff";
            roundRect(player.x, player.y, player.w, player.h, 7, true);
            ctx.fillStyle = "#0f1f34";
            ctx.fillRect(player.x + 7, player.y + 10, 8, 8);
            ctx.fillStyle = "#fff";
            ctx.fillRect(player.x + (player.direction > 0 ? 22 : 4), player.y + 14, 8, 4);
        }

        // Bullets
        state.bullets.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fill();
        });

        // Enemies
        state.enemies.forEach(e => {
            ctx.fillStyle = e.color;
            roundRect(e.x, e.y, e.w, e.h, 6, true);
            ctx.fillStyle = "#200";
            ctx.fillRect(e.x + 8, e.y + 11, 6, 6);
            ctx.fillRect(e.x + 20, e.y + 11, 6, 6);
            if (e.hp > 1) {
                ctx.fillStyle = "#fff";
                ctx.font = "12px sans-serif";
                ctx.fillText(String(e.hp), e.x + 13, e.y - 5);
            }
        });

        // Bonuses
        state.bonuses.forEach(p => {
            const colors = { life: "#73ff9d", rapid: "#5df7ff", blast: "#ffd166" };
            ctx.fillStyle = colors[p.kind];
            roundRect(p.x, p.y, p.w, p.h, 6, true);
            ctx.fillStyle = "#062";
            ctx.font = "bold 12px monospace";
            ctx.fillText(p.kind[0].toUpperCase(), p.x + 8, p.y + 16);
        });

        // Particles
        state.particles.forEach(s => {
            ctx.globalAlpha = Math.max(0, s.life * 2);
            ctx.fillStyle = s.color;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        });

        if (hitFlash > 0) {
            ctx.fillStyle = `rgba(255, 90, 90, ${0.2 * hitFlash})`;
            ctx.fillRect(0, 0, W, H);
        }
    }

    function syncHud() {
        ui.score.textContent = state.score;
        ui.lives.textContent = state.lives;
        ui.level.textContent = state.level;
        ui.combo.textContent = `x${state.combo}`;
        ui.weapon.textContent = player.weaponMode === "normal" ? "Normal" : player.weaponMode === "rapid" ? "Rapid Fire" : "Blast";
    }

    function loop(t) {
        const dt = Math.min(0.033, (t - lastTime) / 1000);
        lastTime = t;
        update(dt);
        draw();
        if (running) requestAnimationFrame(loop);
    }

    function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function circleRectCollision(c, r) {
        const cx = Math.max(r.x, Math.min(c.x, r.x + r.w));
        const cy = Math.max(r.y, Math.min(c.y, r.y + r.h));
        const dx = c.x - cx;
        const dy = c.y - cy;
        return dx * dx + dy * dy <= c.r * c.r;
    }

    function roundRect(x, y, w, h, r, fill = false) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        if (fill) ctx.fill();
    }

    ui.startBtn.addEventListener("click", () => {
        ui.overlay.querySelector("h1").textContent = "Neon Platform Shooter";
        ui.overlay.querySelector("p").innerHTML = "<strong>ZQSD / Flèches</strong> pour bouger, <strong>ESPACE</strong> pour sauter, <strong>J</strong> pour tirer.";
        ui.overlay.querySelectorAll("p")[1].textContent = "Élimine des monstres, récupère des bonus (vie, rapid fire, blast), grimpe les niveaux et garde ton combo vivant.";
        ui.startBtn.textContent = "Lancer la partie";
        resetGame();
    });

    syncHud();
    draw();
</script>
</body>
</html>
