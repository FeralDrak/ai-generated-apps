<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Platform Shooter</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-1: #0b1021;
            --bg-2: #111b36;
            --accent: #31e8ff;
            --accent-2: #ff4fd8;
            --good: #70ff6f;
            --danger: #ff5757;
            --text: #eaf2ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                    radial-gradient(circle at 20% 10%, #1f2d60, transparent 45%),
                    radial-gradient(circle at 80% 90%, #4a1655, transparent 35%),
                    linear-gradient(160deg, var(--bg-1), var(--bg-2));
            color: var(--text);
            padding: 20px;
        }

        .game-shell {
            width: min(1100px, 98vw);
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .hud {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(5, 11, 25, 0.65);
            backdrop-filter: blur(4px);
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            font-weight: 600;
        }

        .pill {
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
            font-size: 0.94rem;
        }

        .controls {
            font-size: 0.9rem;
            opacity: 0.88;
        }

        canvas {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(#061127, #0a1831 42%, #101331);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
            image-rendering: pixelated;
            display: block;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            pointer-events: none;
        }

        .message {
            text-align: center;
            background: rgba(2, 6, 16, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.26);
            border-radius: 14px;
            padding: 18px 20px;
            max-width: 86%;
        }

        .message h1 {
            font-size: clamp(1.2rem, 1.8vw, 1.8rem);
            margin-bottom: 8px;
            color: var(--accent);
        }

        .message p {
            line-height: 1.35;
            font-size: clamp(0.9rem, 1.4vw, 1rem);
            opacity: 0.95;
        }

        .canvas-wrap {
            position: relative;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-shell">
    <div class="hud">
        <div class="stats">
            <span class="pill" id="score">Score: 0</span>
            <span class="pill" id="health">Health: 100</span>
            <span class="pill" id="wave">Wave: 1</span>
            <span class="pill" id="ammo">Energy: ∞</span>
        </div>
        <div class="controls">Move: A/D or ←/→ · Jump: W/↑/Space · Shoot: J / Left Click · Restart: R</div>
    </div>

    <div class="canvas-wrap">
        <canvas id="game" width="1280" height="720"></canvas>
        <div class="overlay" id="overlay">
            <div class="message" id="messageBox">
                <h1>Neon Platform Shooter</h1>
                <p>Defeat monsters, collect boosts, survive endless waves.<br/>Press <strong>Enter</strong> to start.</p>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const ui = {
        score: document.getElementById("score"),
        health: document.getElementById("health"),
        wave: document.getElementById("wave"),
        ammo: document.getElementById("ammo"),
        overlay: document.getElementById("overlay"),
        messageBox: document.getElementById("messageBox")
    };

    const WORLD_WIDTH = 2800;
    const WORLD_HEIGHT = 1200;
    const GRAVITY = 0.75;
    const keys = new Set();

    const rand = (min, max) => Math.random() * (max - min) + min;

    const game = {
        running: false,
        gameOver: false,
        score: 0,
        wave: 1,
        time: 0,
        shake: 0,
        camera: { x: 0, y: 0 },
        particles: [],
        projectiles: [],
        enemies: [],
        pickups: [],
        platforms: [],
        stars: []
    };

    const player = {
        x: 220,
        y: 180,
        w: 44,
        h: 58,
        vx: 0,
        vy: 0,
        speed: 5.2,
        jumpPower: 14,
        grounded: false,
        facing: 1,
        fireCooldown: 0,
        health: 100,
        maxHealth: 100,
        rapidFire: 0,
        shield: 0,
        color: "#55dfff"
    };

    function makeLevel() {
        game.platforms = [
            { x: 0, y: WORLD_HEIGHT - 50, w: WORLD_WIDTH, h: 70, type: "ground" },
            { x: 180, y: 860, w: 360, h: 26 },
            { x: 640, y: 760, w: 280, h: 24 },
            { x: 1020, y: 670, w: 330, h: 24 },
            { x: 1490, y: 790, w: 280, h: 24 },
            { x: 1840, y: 675, w: 250, h: 24 },
            { x: 2200, y: 560, w: 300, h: 24 },
            { x: 2420, y: 860, w: 230, h: 24 },
            { x: 480, y: 520, w: 210, h: 24 },
            { x: 880, y: 430, w: 200, h: 24 },
            { x: 1320, y: 410, w: 230, h: 24 },
            { x: 1730, y: 350, w: 260, h: 24 },
            { x: 2080, y: 280, w: 240, h: 24 },
        ];

        game.stars = Array.from({ length: 180 }, () => ({
            x: rand(0, WORLD_WIDTH),
            y: rand(0, WORLD_HEIGHT * 0.65),
            size: rand(1, 3),
            speed: rand(0.02, 0.14)
        }));
    }

    function resetGame() {
        game.running = true;
        game.gameOver = false;
        game.score = 0;
        game.wave = 1;
        game.time = 0;
        game.shake = 0;
        game.projectiles = [];
        game.enemies = [];
        game.particles = [];
        game.pickups = [];
        game.camera.x = 0;
        game.camera.y = 0;

        player.x = 220;
        player.y = 260;
        player.vx = 0;
        player.vy = 0;
        player.health = player.maxHealth;
        player.rapidFire = 0;
        player.shield = 0;
        player.fireCooldown = 0;

        spawnWave();
        hideOverlay();
        updateHUD();
    }

    function spawnWave() {
        const enemyCount = 4 + game.wave * 2;
        for (let i = 0; i < enemyCount; i++) {
            const typeRoll = Math.random();
            const type = typeRoll > 0.78 ? "brute" : typeRoll > 0.48 ? "crawler" : "hopper";
            game.enemies.push(createEnemy(type));
        }
    }

    function createEnemy(type) {
        const base = {
            x: rand(350, WORLD_WIDTH - 80),
            y: rand(200, 900),
            vx: rand(-1, 1),
            vy: 0,
            dead: false,
            hitFlash: 0,
        };

        if (type === "brute") {
            return { ...base, type, w: 58, h: 68, speed: 1.7 + game.wave * 0.06, hp: 55 + game.wave * 10, damage: 20, color: "#ff8d3b", points: 30, jumpChance: 0.006 };
        }
        if (type === "crawler") {
            return { ...base, type, w: 44, h: 36, speed: 2.9 + game.wave * 0.07, hp: 30 + game.wave * 7, damage: 14, color: "#97ff6b", points: 18, jumpChance: 0.003 };
        }
        return { ...base, type, w: 42, h: 50, speed: 2.2 + game.wave * 0.08, hp: 22 + game.wave * 6, damage: 12, color: "#ff52b3", points: 14, jumpChance: 0.015 };
    }

    function spawnPickup(x, y) {
        const roll = Math.random();
        let kind = "heal";
        if (roll > 0.7) kind = "rapid";
        if (roll > 0.9) kind = "shield";

        game.pickups.push({
            x,
            y,
            w: 24,
            h: 24,
            kind,
            ttl: 900
        });
    }

    function showOverlay(title, text) {
        ui.messageBox.innerHTML = `<h1>${title}</h1><p>${text}</p>`;
        ui.overlay.classList.remove("hidden");
    }

    function hideOverlay() {
        ui.overlay.classList.add("hidden");
    }

    function updateHUD() {
        ui.score.textContent = `Score: ${game.score}`;
        ui.health.textContent = `Health: ${Math.max(0, Math.round(player.health))}`;
        ui.wave.textContent = `Wave: ${game.wave}`;
        ui.ammo.textContent = player.rapidFire > 0 ? `Energy: OVERDRIVE ${Math.ceil(player.rapidFire / 60)}s` : player.shield > 0 ? `Energy: SHIELD ${Math.ceil(player.shield / 60)}s` : "Energy: ∞";
    }

    function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
    }

    function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function shoot(originX, originY, direction) {
        if (player.fireCooldown > 0) return;

        const speed = 13;
        game.projectiles.push({
            x: originX,
            y: originY,
            vx: speed * direction,
            vy: rand(-0.5, 0.5),
            w: 12,
            h: 4,
            life: 90,
            color: player.rapidFire > 0 ? "#ffe87a" : "#66f9ff",
            damage: player.rapidFire > 0 ? 16 : 11
        });

        if (player.rapidFire > 0) {
            player.fireCooldown = 5;
        } else {
            player.fireCooldown = 12;
        }

        emitParticles(originX, originY, 6, "#8cf7ff", 2.2);
    }

    function emitParticles(x, y, count, color, speed = 1.5) {
        for (let i = 0; i < count; i++) {
            game.particles.push({
                x,
                y,
                vx: rand(-speed, speed),
                vy: rand(-speed, speed),
                life: rand(18, 40),
                color,
                size: rand(2, 4)
            });
        }
    }

    function damagePlayer(amount) {
        if (player.shield > 0) {
            player.shield -= amount * 2;
            if (player.shield < 0) player.shield = 0;
            emitParticles(player.x + player.w / 2, player.y + player.h / 2, 10, "#64f7ff", 3);
            return;
        }

        player.health -= amount;
        game.shake = 10;
        emitParticles(player.x + player.w / 2, player.y + player.h / 2, 14, "#ff6d6d", 3);

        if (player.health <= 0) {
            player.health = 0;
            gameOver();
        }
    }

    function gameOver() {
        game.running = false;
        game.gameOver = true;
        showOverlay("Game Over", `Final score: <strong>${game.score}</strong><br/>Press <strong>R</strong> to restart and try to beat your record.`);
    }

    function physicsBody(body) {
        body.vy += GRAVITY;
        body.x += body.vx;
        body.y += body.vy;

        let grounded = false;

        for (const p of game.platforms) {
            if (!rectsOverlap(body, p)) continue;

            const prevY = body.y - body.vy;
            const prevBottom = prevY + body.h;

            if (prevBottom <= p.y + 4 && body.vy >= 0) {
                body.y = p.y - body.h;
                body.vy = 0;
                grounded = true;
            } else if (prevY >= p.y + p.h - 4 && body.vy < 0) {
                body.y = p.y + p.h;
                body.vy = 0;
            } else if (body.x + body.w / 2 < p.x + p.w / 2) {
                body.x = p.x - body.w;
                body.vx *= -0.35;
            } else {
                body.x = p.x + p.w;
                body.vx *= -0.35;
            }
        }

        body.x = clamp(body.x, 0, WORLD_WIDTH - body.w);
        if (body.y > WORLD_HEIGHT + 240) {
            body.y = 140;
            body.vy = 0;
        }
        return grounded;
    }

    function updatePlayer() {
        if (!game.running) return;

        const moveLeft = keys.has("ArrowLeft") || keys.has("KeyA");
        const moveRight = keys.has("ArrowRight") || keys.has("KeyD");
        const jump = keys.has("ArrowUp") || keys.has("KeyW") || keys.has("Space");
        const fire = keys.has("KeyJ");

        if (moveLeft) {
            player.vx = -player.speed;
            player.facing = -1;
        } else if (moveRight) {
            player.vx = player.speed;
            player.facing = 1;
        } else {
            player.vx *= 0.78;
            if (Math.abs(player.vx) < 0.06) player.vx = 0;
        }

        if (jump && player.grounded) {
            player.vy = -player.jumpPower;
            player.grounded = false;
            emitParticles(player.x + player.w / 2, player.y + player.h, 10, "#b8f8ff", 2.8);
        }

        player.grounded = physicsBody(player);

        if (fire) {
            shoot(player.x + (player.facing === 1 ? player.w + 6 : -8), player.y + 22, player.facing);
        }

        if (player.fireCooldown > 0) player.fireCooldown--;
        if (player.rapidFire > 0) player.rapidFire--;
        if (player.shield > 0) player.shield--;
    }

    function updateProjectiles() {
        for (const shot of game.projectiles) {
            shot.x += shot.vx;
            shot.y += shot.vy;
            shot.life--;

            if (shot.life < 1 || shot.x < -40 || shot.x > WORLD_WIDTH + 40) {
                shot.dead = true;
                continue;
            }

            for (const e of game.enemies) {
                if (e.dead) continue;
                if (!rectsOverlap(shot, e)) continue;

                e.hp -= shot.damage;
                e.hitFlash = 4;
                shot.dead = true;
                emitParticles(shot.x, shot.y, 7, "#f9ffff", 2.5);

                if (e.hp <= 0) {
                    e.dead = true;
                    game.score += e.points;
                    emitParticles(e.x + e.w / 2, e.y + e.h / 2, 22, e.color, 3.5);
                    if (Math.random() > 0.62) {
                        spawnPickup(e.x + e.w / 2, e.y - 12);
                    }
                }
                break;
            }
        }
        game.projectiles = game.projectiles.filter((s) => !s.dead);
    }

    function updateEnemies() {
        if (!game.running) return;

        for (const e of game.enemies) {
            if (e.dead) continue;

            const toPlayer = player.x - e.x;
            const dir = Math.sign(toPlayer || 1);
            e.vx = clamp(e.vx + dir * 0.12, -e.speed, e.speed);

            if (Math.random() < e.jumpChance && Math.abs(player.y - e.y) > 70) {
                e.vy = -rand(8, 12.5);
            }

            physicsBody(e);

            if (e.hitFlash > 0) e.hitFlash--;

            if (rectsOverlap(e, player)) {
                damagePlayer(e.damage * 0.06);
                player.vx += dir * 0.9;
            }
        }

        game.enemies = game.enemies.filter((e) => !e.dead);

        if (game.enemies.length === 0) {
            game.wave++;
            game.score += 80;
            emitParticles(player.x + player.w / 2, player.y, 30, "#f4f089", 4.1);
            spawnWave();
        }
    }

    function updatePickups() {
        for (const p of game.pickups) {
            p.ttl--;
            p.y += Math.sin((game.time + p.x) * 0.05) * 0.25;

            if (rectsOverlap(player, p)) {
                if (p.kind === "heal") {
                    player.health = clamp(player.health + 30, 0, player.maxHealth);
                    game.score += 15;
                    emitParticles(p.x, p.y, 18, "#73ff89", 3.2);
                } else if (p.kind === "rapid") {
                    player.rapidFire = 60 * 8;
                    game.score += 25;
                    emitParticles(p.x, p.y, 18, "#ffe67a", 3.2);
                } else if (p.kind === "shield") {
                    player.shield = 60 * 10;
                    game.score += 30;
                    emitParticles(p.x, p.y, 18, "#7ce9ff", 3.2);
                }
                p.dead = true;
            }

            if (p.ttl <= 0) p.dead = true;
        }
        game.pickups = game.pickups.filter((p) => !p.dead);
    }

    function updateParticles() {
        for (const p of game.particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.03;
            p.vx *= 0.98;
            p.life--;
        }
        game.particles = game.particles.filter((p) => p.life > 0);
    }

    function updateCamera() {
        const targetX = player.x - canvas.width * 0.35;
        const targetY = player.y - canvas.height * 0.55;
        game.camera.x += (targetX - game.camera.x) * 0.08;
        game.camera.y += (targetY - game.camera.y) * 0.08;
        game.camera.x = clamp(game.camera.x, 0, WORLD_WIDTH - canvas.width);
        game.camera.y = clamp(game.camera.y, 0, WORLD_HEIGHT - canvas.height);
    }

    function drawBackground() {
        ctx.fillStyle = "#071225";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (const s of game.stars) {
            const sx = (s.x - game.camera.x * s.speed) % canvas.width;
            const x = sx < 0 ? sx + canvas.width : sx;
            const y = (s.y - game.camera.y * s.speed * 0.6) % canvas.height;
            ctx.fillStyle = "rgba(190,220,255,0.8)";
            ctx.fillRect(x, y, s.size, s.size);
        }

        const moonX = canvas.width - 170;
        const moonY = 110;
        ctx.beginPath();
        ctx.arc(moonX, moonY, 48, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(124, 223, 255, 0.22)";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(moonX + 16, moonY - 7, 35, 0, Math.PI * 2);
        ctx.fillStyle = "#071225";
        ctx.fill();
    }

    function drawWorld() {
        ctx.save();
        const shakeX = game.shake > 0 ? rand(-game.shake, game.shake) : 0;
        const shakeY = game.shake > 0 ? rand(-game.shake, game.shake) : 0;
        ctx.translate(-game.camera.x + shakeX, -game.camera.y + shakeY);

        for (const p of game.platforms) {
            const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
            grad.addColorStop(0, p.type === "ground" ? "#2c3d86" : "#2b3882");
            grad.addColorStop(1, p.type === "ground" ? "#171e47" : "#161c45");
            ctx.fillStyle = grad;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeStyle = "rgba(132,183,255,0.23)";
            ctx.strokeRect(p.x, p.y, p.w, p.h);
        }

        for (const p of game.pickups) {
            const color = p.kind === "heal" ? "#69ff89" : p.kind === "rapid" ? "#ffe57d" : "#75e6ff";
            ctx.fillStyle = color;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeStyle = "rgba(255,255,255,0.8)";
            ctx.strokeRect(p.x + 3, p.y + 3, p.w - 6, p.h - 6);
        }

        for (const shot of game.projectiles) {
            ctx.fillStyle = shot.color;
            ctx.fillRect(shot.x, shot.y, shot.w, shot.h);
        }

        for (const e of game.enemies) {
            const c = e.hitFlash > 0 ? "#ffffff" : e.color;
            ctx.fillStyle = c;
            ctx.fillRect(e.x, e.y, e.w, e.h);

            ctx.fillStyle = "rgba(0,0,0,0.35)";
            ctx.fillRect(e.x + 8, e.y + 12, e.w - 16, 8);

            const hpRatio = clamp(e.hp / (e.type === "brute" ? 55 + game.wave * 10 : e.type === "crawler" ? 30 + game.wave * 7 : 22 + game.wave * 6), 0, 1);
            ctx.fillStyle = "#ff3838";
            ctx.fillRect(e.x, e.y - 8, e.w, 5);
            ctx.fillStyle = "#67ff5e";
            ctx.fillRect(e.x, e.y - 8, e.w * hpRatio, 5);
        }

        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);

        ctx.fillStyle = "#0d1d3e";
        ctx.fillRect(player.x + (player.facing === 1 ? 28 : 6), player.y + 18, 12, 8);

        if (player.shield > 0) {
            ctx.beginPath();
            ctx.arc(player.x + player.w / 2, player.y + player.h / 2, 40 + Math.sin(game.time * 0.2) * 3, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(117, 232, 255, 0.72)";
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        for (const p of game.particles) {
            ctx.globalAlpha = clamp(p.life / 36, 0, 1);
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        }
        ctx.globalAlpha = 1;

        ctx.restore();
    }

    function update() {
        game.time++;

        updatePlayer();
        updateProjectiles();
        updateEnemies();
        updatePickups();
        updateParticles();
        updateCamera();

        if (game.shake > 0) game.shake *= 0.88;
        if (game.shake < 0.2) game.shake = 0;

        updateHUD();
    }

    function render() {
        drawBackground();
        drawWorld();
    }

    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener("keydown", (event) => {
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(event.code)) {
            event.preventDefault();
        }

        keys.add(event.code);

        if (!game.running && (event.code === "Enter" || event.code === "KeyR")) {
            resetGame();
        }
        if (game.gameOver && event.code === "KeyR") {
            resetGame();
        }
    });

    window.addEventListener("keyup", (event) => {
        keys.delete(event.code);
    });

    canvas.addEventListener("mousedown", (event) => {
        if (!game.running) return;
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const worldX = x + game.camera.x;
        player.facing = worldX > player.x ? 1 : -1;
        shoot(player.x + (player.facing === 1 ? player.w + 6 : -8), player.y + 22, player.facing);
    });

    makeLevel();
    gameLoop();
</script>
</body>
</html>
