<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 400 300" preserveAspectRatio="xMidYMid meet">
    <!-- Définitions pour les dégradés et ombres -->
    <defs>
        <linearGradient id="furGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" /> <!-- Gris moyen -->
            <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" /> <!-- Gris foncé -->
        </linearGradient>
        <filter id="dropShadow" height="1.3">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="4" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Groupe principal avec une légère rotation pour plus de dynamisme -->
    <g transform="rotate(-10)" filter="url(#dropShadow)">

        <!-- La Queue -->
        <path d="M-40 100 Q-20 60 10 40 T 60 20" stroke="#2d3748" stroke-width="8" fill="none" stroke-linecap="round"/>

        <!-- L'arrière-train et les pattes arrière -->
        <path d="M60 20 Q90 120 40 180 L 50 220 L 80 220 L 85 185 Q 120 130 110 30 Z" fill="url(#furGradient)"/>

        <!-- Le corps et le cou -->
        <path d="M110 30 Q 115 90 140 120 Q 160 140 200 120 L 200 60 Q 130 40 110 30 Z" fill="url(#furGradient)"/>

        <!-- Le cou (couleur légèrement différente pour la fourrure du gilet) -->
        <path d="M140 120 Q 160 140 170 160 L 190 130 Q 160 100 140 120 Z" fill="#cbd5e0"/>

        <!-- La Tête -->
        <g>
            <!-- Oreilles -->
            <path d="M180 50 L 190 10 L 205 45 Z" fill="#1a202c"/>
            <path d="M205 45 L 220 15 L 230 55 Z" fill="#1a202c"/>

            <!-- Crâne et museau -->
            <path d="M180 50
               C 170 60, 160 100, 170 130
               C 180 150, 210 160, 230 145
               C 240 130, 245 110, 235 80
               C 230 60, 215 40, 190 45
               Z" fill="url(#furGradient)"/>

            <!-- Detail du front -->
            <path d="M190 45 C 200 45, 210 55, 220 70" fill="none" stroke="#1a202c" stroke-width="2" opacity="0.3"/>
        </g>

        <!-- Yeux -->
        <circle cx="210" cy="80" r="3" fill="#fbd38d" /> <!-- Jaune doré -->
        <circle cx="211" cy="79" r="1" fill="#000" />   <!-- Pupille -->

        <!-- Pattes avant (simulées par des traits) -->
        <path d="M170 160 Q 175 200 175 220 L 185 220 Q 185 200 190 160" fill="url(#furGradient)"/>
        <path d="M190 160 Q 195 200 195 220 L 205 220 Q 205 200 210 160" fill="url(#furGradient)"/>

    </g>
</svg>