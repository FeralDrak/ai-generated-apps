<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système Solaire Interactif</title>
    <style>
        :root {
            --space-bg: #0b0d17;
            --ui-panel: rgba(20, 25, 40, 0.9);
            --accent: #00f2ff;
            --sun-color: #ffaa00;
            --text-color: #e0e6ed;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--space-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Empêche le scroll */
            height: 100vh;
            width: 100vw;
        }

        /* Éléments d'arrière-plan étoiles générés par JS ou CSS simple */
        #space-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                    radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                    radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                    radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            z-index: -1;
        }

        /* Interface */
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: var(--ui-panel);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-left: 4px solid var(--accent);
            max-width: 300px;
        }

        h1 { margin: 0 0 10px 0; font-size: 1.2rem; color: var(--accent); }
        p { font-size: 0.9rem; line-height: 1.4; opacity: 0.8; }

        button {
            background: var(--accent);
            border: none;
            padding: 5px 10px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }

        /* Le Système Solaire */
        .solar-system {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
        }

        /* Orbites */
        .orbit-path {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            pointer-events: none; /* Les clics traversent vers les planètes */
        }

        .celestial-body {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.8), 0 0 10px rgba(255,255,255,0.1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .celestial-body:hover {
            transform: translate(-50%, -50%) scale(1.3) !important; /* Effet zoom au survol */
            box-shadow: 0 0 20px var(--accent);
            z-index: 100;
        }

        /* Texture pour le soleil */
        .sun {
            background: radial-gradient(circle at 30% 30%, #ffd700, #ff8c00, #5c2e00);
            animation: pulse 4s infinite ease-in-out;
        }

        /* Texture pour les planètes (simulée avec CSS) */
        .planet {
            background-size: cover;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,1), 0 0 5px currentColor;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            white-space: nowrap;
            text-shadow: 0 0 3px #fff;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .celestial-body:hover .label {
            opacity: 1;
            top: -25px;
        }

        /* Panneau d'info détaillé (Modal) */
        #info-panel {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 300px;
            background: var(--ui-panel);
            border-radius: 8px;
            padding: 20px;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.5);
            transform: translateX(120%); /* Caché par défaut */
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 20;
        }

        #info-panel.active {
            transform: translateX(0);
        }

        #info-panel h2 { margin-top: 0; color: var(--accent); }
        .stat-row { display: flex; justify-content: space-between; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0; }
        .fact-box {
            margin-top: 15px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 4px;
            font-style: italic;
        }

        /* Controles en haut à droite */
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }

        .control-group {
            background: var(--ui-panel);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        input[type="range"] { width: 100%; accent-color: var(--accent); }

    </style>
</head>
<body>

<div id="space-canvas"></div>

<!-- Controles -->
<div class="controls">
    <div class="control-group">
        <label for="speed-slider">Vitesse du temps :</label>
        <input type="range" id="speed-slider" min="0" max="10" step="0.5" value="2">
        <button onclick="togglePlay()" style="width:100%">Pause / Reprendre</button>
    </div>
</div>

<!-- Interface Gauche -->
<div class="ui-overlay">
    <h1>Système Solaire<br><small>Démo Interactive</small></h1>
    <p>Cliquez sur une planète, son satellite ou le Soleil pour voir des détails.</p>
    <p style="font-size: 0.8rem; color: #aaa;">L'échelle de distance est artistique pour que tout tienne à l'écran.</p>
</div>

<!-- Le Système -->
<div id="solar-system" class="solar-system">
    <!-- Généré par JS -->
</div>

<!-- Info Panel -->
<div id="info-panel">
    <h2 id="info-name">Planète</h2>
    <div class="fact-box" id="info-desc">Description ici...</div>
    <div style="margin-top:10px;">
        <div class="stat-row"><span>Satélite principal :</span> <strong id="satellite-name"></strong></div>
        <div class="stat-row"><span>Temps de révolution :</span> <strong id="rev-time"></strong></div>
        <div class="stat-row"><span>Température moy.:</span> <strong id="temp-val"></strong></div>
    </div>
    <button onclick="closePanel()">Fermer</button>
</div>

<script>
    // --- Données du Système Solaire ---
    // Les tailles et distances sont "artistiques" pour l'affichage, pas réelles (sinon on ne verrait rien).
    const celestialData = [
        {
            id: 'sun', name: 'Soleil', type: 'star',
            size: 60, distance: 0, speed: 0, color: '#ffaa00',
            desc: "Étoile naine jaune au centre du système solaire. C'est une boule de plasma gazeux qui contient à lui seul 99,8% de la masse du système.",
            fact: "Si vous remplissiez le soleil d'eau, il faudrait boire pendant 3 milliards d'années pour vider son volume.",
            temp: "5500°C (Surface)"
        },
        {
            id: 'mercury', name: 'Mercure', type: 'planet',
            size: 12, distance: 60, speed: 3.5, color: '#a5a5a5', sat: "Aucun satellite",
            desc: "La plus petite planète et celle la plus proche du Soleil. Elle est très chaude du côté jour (-180°C) et très froide du côté nuit.",
            fact: "Une année sur Mercure ne dure que 88 jours terrestres !",
            temp: "-173°C à 427°C"
        },
        {
            id: 'venus', name: 'Vénus', type: 'planet',
            size: 24, distance: 95, speed: 2.8, color: '#e6bb9a', sat: "Aucun satellite",
            desc: "La plus chaude planète du système solaire à cause de son effet de serre intense dû à l'atmosphère dense de CO2.",
            fact: "Le jour fait deux fois plus longtemps que l'année sur Vénus (elle tourne très lentement sur elle-même).",
            temp: "462°C"
        },
        {
            id: 'earth', name: 'Terre', type: 'planet',
            size: 26, distance: 140, speed: 2.0, color: '#2e86c1', sat: "Lune",
            desc: "Notre maison bleue. C'est la seule planète connue à posséder de la vie.",
            fact: "La Terre a un bouclier magnétique invisible qui nous protège des vents solaires mortels.",
            temp: "-88°C à 58°C"
        },
        {
            id: 'moon', name: 'Lune', type: 'satellite',
            size: 10, distanceOffset: 75, speed: 6.0, color: '#cccccc', sat: null,
            desc: "Le seul satellite naturel de la Terre. Elle régit les marées et permet l'orientation spatiale grâce à ses cratères.",
            fact: "L'éclipsed sur la Lune est visible par environ 180 pays du globe.",
            temp: "-153°C à 127°C"
        },
        {
            id: 'mars', name: 'Mars', type: 'planet',
            size: 18, distance: 195, speed: 1.6, color: '#c0392b', sat: "Phobos, Déimos",
            desc: "La planète rouge. Un volcan dormant, le mont Olympe, s'y trouve (plus de 3 fois plus haut que l'Etna).",
            fact: "Le rover Perseverance est actuellement à bord pour rechercher des signes de vie microbienne.",
            temp: "-140°C à -50°C"
        },
        {
            id: 'jupiter', name: 'Jupiter', type: 'planet',
            size: 85, distance: 270, speed: 0.9, color: '#d35400', sat: "Europe (Gazéique)",
            desc: "La géante gazeuse. Elle protège la Terre des comètes grâce à ses nombreux satellites et sa gravité immense.",
            fact: "Sa tache rouge est une tempête qui dure depuis au moins 350 ans !",
            temp: "-145°C"
        },
        {
            id: 'saturn', name: 'Saturne', type: 'planet',
            size: 60, distance: 350, speed: 0.7, color: '#f1c40f', hasRings: true, sat: "Titan",
            desc: "Reconnue par ses magnifiques anneaux de glace et de roche. C'est la planète la moins dense (elle flotterait sur l'eau !).",
            fact: "La nuit sur Saturne, il y a 27 sources de lumière : des lunes volcaniques émettrices.",
            temp: "-178°C"
        },
        {
            id: 'uranus', name: 'Uranus', type: 'planet',
            size: 40, distance: 430, speed: 0.5, color: '#aaddff', sat: "Titania",
            desc: "La planète glaiseuse la plus froide. Elle est penchée de côté (98°) sur son axe.",
            fact: "Elle était le premier objet astronomique observé qui n'était pas une étoile mais une planète (par Herschel en 1781).",
            temp: "-224°C"
        },
        {
            id: 'neptune', name: 'Neptune', type: 'planet',
            size: 38, distance: 500, speed: 0.3, color: '#2c3e50', sat: "Naiad",
            desc: "La plus lointaine planète de notre système solaire. Elle a un vent très fort (plus de 2000 km/h).",
            fact: "Sa couleur bleue vient de la présence d'une petite quantité de méthane dans son atmosphère.",
            temp: "-219°C"
        }
    ];

    const container = document.getElementById('solar-system');
    let animationId;
    let speedMultiplier = 1;
    let isPaused = false;

    // --- Initialisation ---

    function createSolarSystem() {
        celestialData.forEach(body => {
            // Création de l'orbite
            const orbitPath = document.createElement('div');
            orbitPath.className = 'orbit-path';
            orbitPath.style.width = (body.distance * 2) + 'px';
            orbitPath.style.height = (body.distance * 2) + 'px';
            container.appendChild(orbitPath);

            // Création de l'astre
            const bodyEl = document.createElement('div');

            // Configuration DOM éléments
            let classes = ['celestial-body', body.type];

            if(body.id !== 'sun') {
                // Pour les planètes, on ajoute un effet visuel simple
                classes.push('planet');
                // Couleur d'ombre pour l'effet 3D
                bodyEl.style.color = body.color;
            } else {
                classes.push('sun');
            }

            if(body.hasRings) {
                const ring = document.createElement('div');
                ring.style.position = 'absolute';
                ring.style.width = body.size * 2 + 40 + 'px';
                ring.style.height = body.size * 2 + 15 + 'px';
                ring.style.borderRadius = '50%';
                ring.style.border = '8px solid rgba(200,200,255,0.4)';
                ring.style.top = '-8px'; left = '-8px'; // ajuste pour le centrage exact
                bodyEl.appendChild(ring);
            }

            bodyEl.className = classes.join(' ');
            bodyEl.style.width = body.size + 'px';
            bodyEl.style.height = body.size + 'px';
            bodyEl.style.backgroundColor = body.color;

            // Label de nom (caché par défaut, visible au survol)
            const label = document.createElement('div');
            label.className = 'label';
            label.innerText = body.name;
            bodyEl.appendChild(label);

            // Données pour la logique JS
            bodyEl.dataset.id = body.id;
            bodyEl.dataset.speed = (body.speed || 1) / 10; // Vitesse relative

            // Événement de clic
            bodyEl.addEventListener('click', () => showInfo(body));

            container.appendChild(bodyEl);
        });
    }

    // --- Logique d'Animation ---

    function update() {
        if (isPaused) return;

        const time = Date.now();

        celestialData.forEach(body => {
            // On saute le soleil (pas de vitesse)
            if (body.speed === 0) return;

            const el = document.querySelector(`.celestial-body[data-id="${body.id}"]`);

            // Calcul du mouvement circulaire
            // Le temps est divisé par la distance pour simuler les orbites elliptiques simplifiées
            // speedMultiplier contrôle l'état "Pause/Play" via le slider

            const angle = (time * 0.01) / body.distance * (body.speed || 1);

            // Rotation de l'orbite elle-même (pour que la planète tourne autour du centre)
            // On ajoute une rotation globale pour que tout le système ne tienne pas en place
            const totalRotation = time * 0.05;

            // Si ce n'est pas le soleil, il doit bouger par rapport au centre
            if (body.distance > 0) {
                const x = Math.cos(angle + totalRotation) * body.distance;
                const y = Math.sin(angle + totalRotation) * body.distance;

                // On applique la transformation pour placer l'élément sur son orbite
                el.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            } else {
                // Le soleil reste au centre
                el.style.transform = 'translate(-50%, -50%)';
            }
        });

        animationId = requestAnimationFrame(update);
    }

    // --- Gestion des Événements UI ---

    const speedSlider = document.getElementById('speed-slider');
    const infoPanel = document.getElementById('info-panel');

    // Le slider agit sur la vitesse globale
    speedSlider.addEventListener('input', (e) => {
        speedMultiplier = parseFloat(e.target.value);
    });

    function togglePlay() {
        isPaused = !isPaused;
        if (!isPaused) update();
    }

    function showInfo(data) {
        document.getElementById('info-name').innerText = data.name;

        // Gestion des types spéciaux (Soleil vs Satellites de Jupiter ex: )
        let satName = "-";
        if(data.sat && data.id !== 'sun') {
            // Petit hack pour l'UI : si c'est un satellite, on dit "Satellite de"
            const parent = document.querySelector(`.celestial-body[data-id="${document.querySelector('.celestial-body').closest('#solar-system').querySelector('.satellite-container')}"]`).dataset.name;
            // Logique simplifiée ici
        }

        if(data.id === 'earth') satName = "Lune";
        else if (data.id === 'jupiter') satName = "Satellites de Jupiter";
        else if (data.id === 'saturn') satName = "Satellites de Saturne";

        document.getElementById('satellite-name').innerText = data.sat || satName;
        document.getElementById('rev-time').innerText = (data.type==='planet' ? (1/Math.sqrt(data.distance)) : 'N/A') + " jours";
        document.getElementById('temp-val').innerText = data.temp || "Variable";
        document.getElementById('info-desc').innerText = `${data.desc}\n\n${data.fact}`;

        infoPanel.classList.add('active');
    }

    function closePanel() {
        infoPanel.classList.remove('active');
    }

    // Lancer le système
    createSolarSystem();
    update();

</script>
</body>
</html>
