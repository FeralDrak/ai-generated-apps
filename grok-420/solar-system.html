<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 Système Solaire Interactif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;600&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        canvas {
            border-radius: 20px;
            box-shadow: 0 0 60px -10px rgb(234 179 8);
        }
        .planet-dot {
            width: 18px;
            height: 18px;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white overflow-hidden">
<div class="flex h-screen">
    <!-- Canvas Area -->
    <div class="flex-1 flex items-center justify-center bg-black relative" id="canvas-container">
        <canvas id="canvas" width="740" height="740" class="bg-black"></canvas>

        <!-- Overlay HUD -->
        <div class="absolute top-6 left-6 bg-black/70 backdrop-blur-xl px-5 py-3 rounded-2xl border border-yellow-400/20 flex items-center gap-3">
            <div onclick="togglePause()" id="pause-btn"
                 class="w-10 h-10 bg-yellow-500 hover:bg-yellow-400 transition-colors rounded-2xl flex items-center justify-center text-2xl cursor-pointer shadow-lg">
                ▶️
            </div>
            <div>
                <div class="text-xs text-yellow-400 tracking-widest font-medium">TEMPS SIMULÉ</div>
                <div id="time-display" class="font-mono text-lg font-semibold">0.0 années</div>
            </div>
        </div>

        <div class="absolute bottom-6 left-6 bg-black/70 backdrop-blur-xl px-6 py-4 rounded-3xl text-sm">
            <div class="flex items-center gap-6 text-xs">
                <div class="flex items-center gap-2">
                    <input type="range" id="speed-slider" min="1" max="500" value="80"
                           class="accent-yellow-400 w-32" oninput="updateSpeed()">
                    <span class="font-mono text-yellow-300 w-12" id="speed-value">80x</span>
                </div>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="show-orbits" checked onchange="toggleOrbits()" class="accent-yellow-400">
                    <span class="text-xs">Orbites</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="show-labels" checked onchange="toggleLabels()" class="accent-yellow-400">
                    <span class="text-xs">Noms</span>
                </label>
            </div>
        </div>

        <div onclick="resetSimulation()"
             class="absolute bottom-6 right-6 bg-zinc-900 hover:bg-zinc-800 px-5 py-2.5 rounded-2xl text-sm flex items-center gap-2 cursor-pointer transition-colors border border-white/10">
            <span>⟳</span>
            <span>Réinitialiser</span>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="w-96 bg-zinc-900 border-l border-white/10 flex flex-col">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="text-4xl">☀️</div>
                <div>
                    <h1 class="title-font text-3xl font-semibold tracking-tighter">Système Solaire</h1>
                    <p class="text-yellow-400 text-sm">Exploration interactive</p>
                </div>
            </div>
        </div>

        <!-- Planet List -->
        <div class="flex-1 overflow-auto p-4" id="planet-list">
            <!-- Populated by JS -->
        </div>

        <!-- Info Panel -->
        <div id="info-panel" class="p-6 border-t border-white/10 bg-zinc-950">
            <div class="text-center text-zinc-500 py-8">
                <div class="text-6xl mb-4 opacity-30">🌍</div>
                <p class="text-sm">Clique sur une planète<br>pour découvrir ses secrets</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ================== DATA ==================
    const planetsData = [
        {
            name: "Mercure",
            radius: 105,
            period: 0.241,
            size: 9,
            color: "#a8a8a8",
            emoji: "☿",
            info: {
                type: "Planète tellurique",
                diameter: "4 879 km",
                distance: "57,9 millions km",
                period: "88 jours terrestres",
                temperature: "-173°C à 427°C",
                moons: "0",
                description: "La planète la plus proche du Soleil. Ses journées sont plus longues que ses années !"
            }
        },
        {
            name: "Vénus",
            radius: 140,
            period: 0.615,
            size: 12,
            color: "#e0c080",
            emoji: "♀",
            info: {
                type: "Planète tellurique",
                diameter: "12 104 km",
                distance: "108,2 millions km",
                period: "225 jours terrestres",
                temperature: "462°C (la plus chaude)",
                moons: "0",
                description: "Surnommée l'étoile du Berger. Son atmosphère dense crée un effet de serre extrême."
            }
        },
        {
            name: "Terre",
            radius: 180,
            period: 1,
            size: 13,
            color: "#4a90e2",
            emoji: "🌍",
            hasMoon: true,
            info: {
                type: "Planète tellurique",
                diameter: "12 742 km",
                distance: "149,6 millions km",
                period: "365,25 jours",
                temperature: "15°C en moyenne",
                moons: "1 (la Lune)",
                description: "Notre planète bleue. La seule connue à ce jour pour abriter la vie."
            }
        },
        {
            name: "Mars",
            radius: 225,
            period: 1.881,
            size: 10,
            color: "#cd5c5c",
            emoji: "♂",
            info: {
                type: "Planète tellurique",
                diameter: "6 779 km",
                distance: "227,9 millions km",
                period: "687 jours terrestres",
                temperature: "-65°C en moyenne",
                moons: "2 (Phobos et Déimos)",
                description: "La planète rouge. Elle possède le plus grand volcan du système solaire : Olympus Mons."
            }
        },
        {
            name: "Jupiter",
            radius: 280,
            period: 11.86,
            size: 22,
            color: "#d2b48c",
            emoji: "♃",
            info: {
                type: "Géante gazeuse",
                diameter: "139 820 km",
                distance: "778,5 millions km",
                period: "11,86 années",
                temperature: "-110°C",
                moons: "95+",
                description: "La plus grosse planète. La Grande Tache Rouge est une tempête qui dure depuis 400 ans."
            }
        },
        {
            name: "Saturne",
            radius: 335,
            period: 29.46,
            size: 19,
            color: "#e3d4b8",
            emoji: "♄",
            hasRings: true,
            info: {
                type: "Géante gazeuse",
                diameter: "120 536 km",
                distance: "1,43 milliards km",
                period: "29,46 années",
                temperature: "-140°C",
                moons: "146+",
                description: "Célèbre pour ses magnifiques anneaux constitués de glace et de roche."
            }
        },
        {
            name: "Uranus",
            radius: 375,
            period: 84.01,
            size: 16,
            color: "#a1e3e3",
            emoji: "♅",
            info: {
                type: "Géante de glace",
                diameter: "51 118 km",
                distance: "2,87 milliards km",
                period: "84 années",
                temperature: "-195°C",
                moons: "28",
                description: "Elle tourne sur le côté ! Son axe est incliné à 98 degrés."
            }
        },
        {
            name: "Neptune",
            radius: 410,
            period: 164.8,
            size: 16,
            color: "#4169e1",
            emoji: "♆",
            info: {
                type: "Géante de glace",
                diameter: "49 528 km",
                distance: "4,5 milliards km",
                period: "164,8 années",
                temperature: "-200°C",
                moons: "16",
                description: "La planète la plus venteuse du système solaire avec des vents à 2 100 km/h."
            }
        }
    ];

    // ================== VARIABLES ==================
    let canvas, ctx;
    let centerX, centerY;
    let simTime = 0;
    let isPaused = false;
    let speedMultiplier = 80;
    let showOrbits = true;
    let showLabels = true;
    let selectedPlanet = null;

    let stars = [];
    let planets = [];

    // ================== INIT ==================
    function init() {
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');
        centerX = canvas.width / 2;
        centerY = canvas.height / 2;

        // Generate stars
        stars = [];
        for (let i = 0; i < 280; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.2 + 0.6
            });
        }

        planets = planetsData.map(p => ({...p, angle: Math.random() * Math.PI * 2}));

        // Generate planet list
        generatePlanetList();

        animate();
    }

    function generatePlanetList() {
        const container = document.getElementById('planet-list');
        container.innerHTML = `
                <div class="space-y-2">
                    ${planetsData.map((planet, index) => `
                        <div onclick="selectPlanetByIndex(${index})"
                             class="group flex items-center gap-4 p-4 rounded-3xl hover:bg-white/5 cursor-pointer transition-all active:scale-[0.97]">
                            <div class="planet-dot" style="background-color: ${planet.color}"></div>
                            <div class="flex-1">
                                <div class="flex justify-between items-baseline">
                                    <span class="font-medium">${planet.emoji} ${planet.name}</span>
                                    <span class="text-[10px] text-zinc-500 font-mono">${planet.period} ans</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
    }

    // ================== ANIMATION ==================
    let lastTime = Date.now();

    function animate() {
        const now = Date.now();
        const delta = (now - lastTime) / 16;
        lastTime = now;

        if (!isPaused) {
            simTime += 0.008 * speedMultiplier * delta;
        }

        draw();
        requestAnimationFrame(animate);
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Stars with twinkle
        ctx.fillStyle = '#ffffff';
        for (let star of stars) {
            ctx.globalAlpha = 0.7 + Math.sin(Date.now()/300 + star.x) * 0.3;
            ctx.fillRect(star.x, star.y, star.size, star.size);
        }
        ctx.globalAlpha = 1;

        // Orbits
        if (showOrbits) {
            ctx.strokeStyle = 'rgba(163, 163, 163, 0.15)';
            ctx.lineWidth = 1.5;
            for (let planet of planets) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, planet.radius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // Sun with glow
        const sunGlow = ctx.createRadialGradient(centerX, centerY, 18, centerX, centerY, 55);
        sunGlow.addColorStop(0, '#fef08c');
        sunGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = sunGlow;
        ctx.beginPath();
        ctx.arc(centerX, centerY, 55, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#facc15';
        ctx.beginPath();
        ctx.arc(centerX, centerY, 26, 0, Math.PI * 2);
        ctx.fill();

        // Planets
        for (let i = 0; i < planets.length; i++) {
            const p = planets[i];
            const angle = simTime * (2 * Math.PI / p.period) * 0.015;
            const x = centerX + Math.cos(angle) * p.radius;
            const y = centerY + Math.sin(angle) * p.radius;

            p.currentX = x;
            p.currentY = y;
            p.currentAngle = angle;

            // Shadow for depth
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath();
            ctx.ellipse(x+4, y+4, p.size*1.1, p.size*0.6, 0, 0, Math.PI*2);
            ctx.fill();

            // Planet
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(x, y, p.size, 0, Math.PI * 2);
            ctx.fill();

            // Special effects
            if (p.name === "Jupiter") {
                ctx.fillStyle = "rgba(255,255,255,0.25)";
                ctx.fillRect(x - p.size + 3, y - 4, p.size*1.6, 3);
            }

            // Saturn rings
            if (p.hasRings) {
                ctx.strokeStyle = "#e0d0a0";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.ellipse(x, y, p.size*1.8, p.size*0.65, angle * 0.3 + 0.6, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Moon for Earth
            if (p.name === "Terre") {
                const moonAngle = angle * 12.3;
                const moonDist = 27;
                const moonX = x + Math.cos(moonAngle) * moonDist;
                const moonY = y + Math.sin(moonAngle) * moonDist;

                ctx.fillStyle = "#ddd";
                ctx.beginPath();
                ctx.arc(moonX, moonY, 4.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Labels
            if (showLabels) {
                ctx.fillStyle = "#ddd";
                ctx.font = "500 13px Inter, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(p.emoji + " " + p.name, x, y - p.size - 14);
            }
        }

        // Update time display
        const years = (simTime * 0.015).toFixed(1);
        document.getElementById('time-display').textContent = years + " années";
    }

    // ================== INTERACTIONS ==================
    function togglePause() {
        isPaused = !isPaused;
        const btn = document.getElementById('pause-btn');
        btn.textContent = isPaused ? "▶️" : "⏸";
    }

    function updateSpeed() {
        speedMultiplier = parseInt(document.getElementById('speed-slider').value);
        document.getElementById('speed-value').textContent = speedMultiplier + "x";
    }

    function toggleOrbits() {
        showOrbits = document.getElementById('show-orbits').checked;
    }

    function toggleLabels() {
        showLabels = document.getElementById('show-labels').checked;
    }

    function resetSimulation() {
        simTime = 0;
    }

    function selectPlanet(planet) {
        selectedPlanet = planet;
        renderInfoPanel(planet);
    }

    function selectPlanetByIndex(index) {
        selectPlanet(planetsData[index]);
    }

    function renderInfoPanel(planet) {
        const panel = document.getElementById('info-panel');
        panel.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <div onclick="event.stopImmediatePropagation()" style="background-color: ${planet.color}"
                         class="w-16 h-16 rounded-2xl flex items-center justify-center text-4xl shadow-inner">
                        ${planet.emoji}
                    </div>
                    <div>
                        <h2 class="text-3xl font-semibold title-font tracking-tighter">${planet.name}</h2>
                        <p class="text-yellow-400 text-sm">${planet.info.type}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div class="bg-white/5 rounded-2xl p-4">
                        <div class="text-xs text-zinc-400 mb-0.5">DIAMÈTRE</div>
                        <div class="font-medium">${planet.info.diameter}</div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-4">
                        <div class="text-xs text-zinc-400 mb-0.5">DISTANCE</div>
                        <div class="font-medium">${planet.info.distance}</div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-4">
                        <div class="text-xs text-zinc-400 mb-0.5">PÉRIODE</div>
                        <div class="font-medium">${planet.info.period}</div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-4">
                        <div class="text-xs text-zinc-400 mb-0.5">TEMPÉRATURE</div>
                        <div class="font-medium">${planet.info.temperature}</div>
                    </div>
                </div>

                <div class="mt-6 bg-white/5 rounded-3xl p-5">
                    <div class="text-xs uppercase tracking-widest text-zinc-400 mb-3">À SAVOIR</div>
                    <p class="text-zinc-300 leading-relaxed">${planet.info.description}</p>
                    <div class="mt-4 pt-4 border-t border-white/10 text-xs flex justify-between text-zinc-400">
                        <div>Lunes : <span class="text-white font-medium">${planet.info.moons}</span></div>
                    </div>
                </div>

                <button onclick="closeInfo()"
                        class="mt-6 w-full py-3 text-sm bg-white/10 hover:bg-white/20 rounded-2xl transition-colors">
                    Fermer
                </button>
            `;
    }

    function closeInfo() {
        const panel = document.getElementById('info-panel');
        panel.innerHTML = `
                <div class="text-center text-zinc-500 py-12">
                    <div class="text-6xl mb-4 opacity-30">🌌</div>
                    <p>Clique sur une planète pour en savoir plus</p>
                </div>
            `;
        selectedPlanet = null;
    }

    // Click detection on canvas
    function handleClick(e) {
        const rect = canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;

        for (let planet of planets) {
            if (!planet.currentX) continue;
            const dx = planet.currentX - clickX;
            const dy = planet.currentY - clickY;
            const distance = Math.sqrt(dx*dx + dy*dy);

            if (distance < planet.size + 18) {
                selectPlanet(planet);
                return;
            }
        }
    }

    // ================== START ==================
    window.onload = function() {
        init();
        canvas.addEventListener('click', handleClick);

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === " ") {
                e.preventDefault();
                togglePause();
            }
            if (e.key === "r" || e.key === "R") {
                resetSimulation();
            }
        });
    };
</script>
</body>
</html>
